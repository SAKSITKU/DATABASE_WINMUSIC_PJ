version: '3.8'

services:
  frontend:
    image: saksitku/winmusic:latest
    container_name: winmusic-frontend
    restart: always
    ports:
      - "80:80"

  backend:
    image: saksitku/winmusic:latest
    container_name: winmusic-backend
    restart: always
    ports:
      - "3040:3040"
    command: node server.js
    environment:
      - DB_SERVER=winmusic-mysql.cpcw0oo2mac7.ap-southeast-2.rds.amazonaws.com
      - DB_PORT=3306
      - DB_USER=admin
      - DB_PASS=WinMusic1234!
      - DB_NAME=stockdb
      - JWT_SECRET=my_super_secret_key_123456
      - JWT_EXPIRES=7d
      - PORT=3040
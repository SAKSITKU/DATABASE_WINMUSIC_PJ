version: '3.8'

services:
  web:
    image: saksitku/winmusic:latest
    ports:
      - "80:80"
    depends_on:
      - api

  api:
    build: ./src/Backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: sa
      DB_PASS: "123456"
      DB_NAME: Stockdata
    depends_on:
      - db

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=123456   # ต้อง strong!
      - MSSQL_MEMORY_LIMIT_MB=512   
    ports:
      - "1433:1433"
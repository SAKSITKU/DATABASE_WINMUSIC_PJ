version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=@Fomost240148
      - MSSQL_MEMORY_LIMIT_MB=512
    ports:
      - "1433:1433"

  api:
    build: .
    container_name: api
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=sa
      - DB_PASS=@Fomost240148
      - DB_NAME=Stockdata
    depends_on:
      - db

  web:
    image: saksitku/winmusic:latest
    ports:
      - "80:80"